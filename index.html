<script>
async function send() {

  const msg = document.getElementById("msg").value;

  if (!msg.trim()) return;

  document.getElementById("out").innerHTML = "🤖 Monglish AI is thinking...";

  try {

    const response = await fetch("https://monglish-ai-backend.onrender.com/chat", {

      method: "POST",

      headers: {
        "Content-Type": "application/json"
      },

      body: JSON.stringify({
        message: msg
      })

    });

    const data = await response.json();

    document.getElementById("out").innerHTML = data.reply;

  } catch (err) {

    document.getElementById("out").innerHTML =
      "❌ Cannot connect to Monglish AI.";

    console.error(err);

  }

}
</script>
